services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: assurme
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d assurme"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/assurme
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src

volumes:
  pgdata:
